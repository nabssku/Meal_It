<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c16" />
      <stop offset="60%" stop-color="#0f5238" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Accent Leaf Gradient -->
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Plate Gradient -->
    <linearGradient id="plate-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Inner Plate Ring -->
  <circle cx="256" cy="266" r="150" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="12" />
  
  <!-- Outer Glow Arc -->
  <path d="M 140 200 A 150 150 0 0 1 372 200" fill="none" stroke="url(#leaf-grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />

  <!-- Main Plate / Bowl Body -->
  <path d="M 156 266 A 100 100 0 0 0 356 266 Z" fill="url(#plate-grad)" />

  <!-- Stylized Fork and Spoon inside the Bowl/Plate -->
  <g fill="#475569" opacity="0.85">
    <!-- Fork -->
    <path d="M 210 220 v 30 h 4 v -30 z M 216 220 v 30 h 4 v -30 z M 222 220 v 30 h 4 v -30 z" />
    <path d="M 210 250 a 8 8 0 0 0 16 0 v 35 h -16 z" />
    <path d="M 216 285 v 30 h 4 v -30 z" />
    
    <!-- Spoon -->
    <path d="M 285 220 c -8 0 -12 12 -12 25 s 4 25 12 25 s 12 -12 12 -25 s -4 -25 -12 -25 z" />
    <path d="M 283 270 v 45 h 4 v -45 z" />
  </g>

  <!-- Giant Emerald Leaf growing out of the bowl to the top right -->
  <!-- Leaf Base Structure -->
  <path d="M 256 266 C 256 170 360 150 370 130 C 370 210 290 260 256 266 Z" fill="url(#leaf-grad)" />
  <!-- Leaf Center Stem -->
  <path d="M 256 266 Q 310 210 370 130" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6" />
</svg>
