<style>
        @keyframes float {
            0% { transform: translateY(0px); opacity: 0; }
            50% { transform: translateY(-10px); opacity: 1; }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .splash-bg {
            background-color: #FFFDF7;
            background-image: radial-gradient(circle at 10% 20%, rgba(34, 197, 94, 0.03) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(253, 118, 26, 0.03) 0%, transparent 20%);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden">
<main class="splash-bg relative flex flex-col items-center justify-center min-h-screen w-full px-container-padding">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl"></div>
</div>
<!-- Center Content -->
<div class="relative z-10 flex flex-col items-center text-center fade-in">
<!-- Logo Container -->
<div class="mb-lg drop-shadow-2xl">
<img alt="MEALIT Logo" class="w-40 h-40 md:w-56 md:h-56 object-contain rounded-xl shadow-lg bg-white p-4" src="https://lh3.googleusercontent.com/aida/ADBb0ui2797-aXqdD2Yi4msGakGTu_D_FlOjZU2nwt8QsMpEP6eZqUpgzfU9SOsCmXhcUALw13T4Kzc5gz7wf7sggHWLl6PGfg-u2GkFKIC_FC2y6PWMkioszCSpR9PVMB5NYicWN-9NhBir5FVf9t_KN3OhfPG56DuCSNQi3nr8TYv8l688pn9NynP1GMAKQE1v9SWUPFrgzcU2OahQh7Mkp-lqIwKe6vfjOdZXeBTEpmq7gyTJtPlJuWGULw"/>
</div>
<!-- Tagline -->
<div class="space-y-sm">
<p class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">
                    MEALIT
                </p>
<h1 class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                    Makan sehat, budget tetap irit.
                </h1>
</div>
</div>
<!-- Loading / Progress Indicator -->
<div class="absolute bottom-16 w-full max-w-[200px] px-md">
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary transition-all duration-100 ease-linear" id="progress-bar" style="width: 0%"></div>
</div>
<p class="mt-xs text-center font-label-sm text-label-sm text-on-surface-variant/60 uppercase tracking-widest">
                Loading...
            </p>
</div>
<!-- Micro-interaction footer -->
<footer class="absolute bottom-sm text-center">
<span class="material-symbols-outlined text-primary animate-bounce">
                expand_more
            </span>
</footer>
</main>
<script>
        // Simple loading simulation
        const progressBar = document.getElementById('progress-bar');
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                // Redirect logic would go here
            } else {
                width += (100 / 30); // Approx 3 seconds
                progressBar.style.width = width + '%';
            }
        }, 100);

        // Gentle parallax effect on mouse move (desktop only)
        if (window.innerWidth > 1024) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                const logo = document.querySelector('.fade-in');
                logo.style.transform = `translate(${x}px, ${y}px)`;
            });
        }
    </script>
</body></html>
