<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;

        }

            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center px-gutter py-2xl">

<div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[300px] h-[300px] bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<main class="w-full max-w-[440px] z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<img alt="MEALIT Logo" class="h-16 w-auto mb-sm transition-transform duration-300 hover:scale-105" src="https://lh3.googleusercontent.com/aida/ADBb0ui2797-aXqdD2Yi4msGakGTu_D_FlOjZU2nwt8QsMpEP6eZqUpgzfU9SOsCmXhcUALw13T4Kzc5gz7wf7sggHWLl6PGfg-u2GkFKIC_FC2y6PWMkioszCSpR9PVMB5NYicWN-9NhBir5FVf9t_KN3OhfPG56DuCSNQi3nr8TYv8l688pn9NynP1GMAKQE1v9SWUPFrgzcU2OahQh7Mkp-lqIwKe6vfjOdZXeBTEpmq7gyTJtPlJuWGULw"/>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight md:font-headline-lg md:text-headline-lg">Welcome to Mealit</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Smart planning for healthy living.</p>
</div>
<!-- Login Form Container -->
<div class="auth-card bg-surface-container-lowest rounded-[20px] p-lg md:p-xl fade-in" id="login-container">
<form class="space-y-lg" id="login-form" onsubmit="return false">
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="login-email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full pl-2xl pr-md py-md bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary transition-all font-body-md text-body-md" id="login-email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="login-password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full pl-2xl pr-md py-md bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary transition-all font-body-md text-body-md" id="login-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-md rounded-xl shadow-lg hover:shadow-xl hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="relative flex items-center py-md">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-on-surface-variant">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google

                New to Mealit?

<!-- Register Form Container -->
<div class="auth-card bg-surface-container-lowest rounded-[20px] p-lg md:p-xl hidden-auth fade-in" id="register-container">
<form class="space-y-lg" id="register-form" onsubmit="return false">
<div class="grid grid-cols-2 gap-md">
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="reg-first-name">First Name</label>
<input class="w-full px-md py-md bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary transition-all font-body-md text-body-md" id="reg-first-name" placeholder="Alex" required="" type="text"/>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="reg-last-name">Last Name</label>
<input class="w-full px-md py-md bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary transition-all font-body-md text-body-md" id="reg-last-name" placeholder="Chen" required="" type="text"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="reg-email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full pl-2xl pr-md py-md bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary transition-all font-body-md text-body-md" id="reg-email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="reg-password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full pl-2xl pr-md py-md bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary transition-all font-body-md text-body-md" id="reg-password" placeholder="Min. 8 characters" required="" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-md rounded-xl shadow-lg hover:shadow-xl hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">

</button>
<div class="relative flex items-center py-md">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-on-surface-variant">or join with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-white border border-outline-variant text-on-surface font-label-md text-label-md py-md rounded-xl hover:bg-surface-container transition-colors flex items-center justify-center gap-md" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

<p class="mt-lg text-center font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <button class="text-primary font-label-md hover:underline" onclick="toggleAuth('login')">Log in here</button>
</p>
</div>
<footer class="mt-2xl text-center space-y-sm">
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-60">
                © 2024 Mealit Inc. All rights reserved.
            </p>
<div class="flex justify-center gap-md font-label-sm text-label-sm text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="opacity-20">•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</footer>
</main>
<script>
        function toggleAuth(view) {
            const loginContainer = document.getElementById('login-container');
            const registerContainer = document.getElementById('register-container');
            const headline = document.querySelector('h1');
            const subhead = document.querySelector('p');

            if (view === 'register') {
                loginContainer.classList.add('hidden-auth');
                registerContainer.classList.remove('hidden-auth');
                headline.innerText = 'Create Account';
                subhead.innerText = 'Join thousands of smart home chefs.';
            } else {
                registerContainer.classList.add('hidden-auth');
                loginContainer.classList.remove('hidden-auth');
                headline.innerText = 'Welcome to Mealit';
                subhead.innerText = 'Smart planning for healthy living.';
            }
        }

        // Add visual feedback to inputs on focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary/20');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary/20');
            });
        });
    </script>
</body></html>
